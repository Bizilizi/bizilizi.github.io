<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 330" role="img" aria-label="Abstract illustration of model collapse: a distribution degrading over repeated generations">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f6fb"/>
      <stop offset="1" stop-color="#e6ebf5"/>
    </linearGradient>
  </defs>
  <rect width="480" height="330" fill="url(#bg2)"/>
  <!-- baseline -->
  <line x1="30" y1="240" x2="450" y2="240" stroke="#9aa3b5" stroke-width="2"/>
  <!-- generation 1: healthy distribution -->
  <path d="M40 240 C70 240 78 110 105 110 C132 110 140 240 170 240" fill="none" stroke="#2455c3" stroke-width="5" stroke-linecap="round"/>
  <!-- generation 2: narrower, drifting -->
  <path d="M175 240 C202 240 204 140 224 140 C238 140 236 190 246 196 C254 200 258 240 280 240" fill="none" stroke="#8a63c9" stroke-width="5" stroke-linecap="round"/>
  <!-- generation 3: collapsed spike -->
  <path d="M290 240 C320 240 330 236 342 90 C354 236 364 240 394 240" fill="none" stroke="#d64550" stroke-width="5" stroke-linecap="round"/>
  <!-- recursion arrows -->
  <path d="M150 70 C210 30 290 30 348 62" fill="none" stroke="#6b7280" stroke-width="3" stroke-dasharray="7 7"/>
  <path d="M348 62 l-16 -7 m16 7 l-4 -17" stroke="#6b7280" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- sample dots feeding back -->
  <circle cx="105" cy="272" r="5" fill="#2455c3"/>
  <circle cx="130" cy="284" r="4" fill="#2455c3" opacity="0.7"/>
  <circle cx="224" cy="272" r="5" fill="#8a63c9"/>
  <circle cx="243" cy="284" r="4" fill="#8a63c9" opacity="0.7"/>
  <circle cx="342" cy="272" r="5" fill="#d64550"/>
  <circle cx="352" cy="284" r="4" fill="#d64550" opacity="0.7"/>
</svg>
