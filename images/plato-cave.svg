<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 330" role="img" aria-label="Abstract illustration of Plato's cave: objects casting shadows on a wall">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#232946"/>
      <stop offset="1" stop-color="#121629"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.22" cy="0.62" r="0.55">
      <stop offset="0" stop-color="#ffb454" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#ff8e3c" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ff8e3c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="330" fill="url(#bg)"/>
  <rect width="480" height="330" fill="url(#glow)"/>
  <!-- cave wall -->
  <path d="M340 0 L480 0 L480 330 L370 330 C355 240 350 120 340 0 Z" fill="#0b0e1d"/>
  <!-- objects -->
  <circle cx="200" cy="180" r="26" fill="#eebbc3"/>
  <rect x="245" y="160" width="44" height="44" rx="6" fill="#b8c1ec" transform="rotate(8 267 182)"/>
  <path d="M160 130 L186 86 L212 130 Z" fill="#a3e7d8"/>
  <!-- shadows on the wall -->
  <ellipse cx="400" cy="185" rx="14" ry="30" fill="#000" opacity="0.55"/>
  <rect x="416" y="158" width="26" height="52" rx="6" fill="#000" opacity="0.5" transform="skewY(6)"/>
  <path d="M378 120 L392 74 L406 128 Z" fill="#000" opacity="0.5"/>
  <!-- floor line -->
  <path d="M0 250 C120 238 300 244 370 330 L0 330 Z" fill="#0e1122" opacity="0.8"/>
</svg>
